buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.1.0'
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

apply plugin: 'com.android.application'

android {
    namespace "com.coin2x2.wallet"
    compileSdkVersion 34
    buildToolsVersion "34.0.0"
    
    buildFeatures {
        buildConfig true // Necessário para gerar a classe BuildConfig
    }
    packagingOptions {
        jniLibs {
            useLegacyPackaging = true // Garante que as bibliotecas .so sejam encontradas
        }
    }
    
    sourceSets {
        main {
            manifest.srcFile 'AndroidManifest.xml'
            res.srcDirs = ['res']
            assets.srcDirs = ['assets']
            jniLibs.srcDirs = ['libs']
        }
    }

    defaultConfig {
        applicationId "com.coin2x2.wallet"
        minSdkVersion 23
        targetSdkVersion 34
        versionCode 202
        versionName "2.0.2"

        ndk {
            abiFilters "arm64-v8a"
        }

        buildConfigField "String", "COIN_NAME", '"2x2Coin"'
        buildConfigField "String", "COIN_TICKER", '"2X2"'
        buildConfigField "int", "COIN_DEFAULT_PORT", "15190"
    }

    buildFeatures {
        buildConfig true
    }

    buildTypes {
    release {
        minifyEnabled false
        shrinkResources false
        signingConfig signingConfigs.release
    }
}

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    packagingOptions {
        jniLibs {
            useLegacyPackaging = true
        }
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androidx.biometric:biometric:1.1.0'
}
